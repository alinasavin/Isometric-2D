
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#192D38', // Dark Grey
              surface: '#000000',    // Black
              primary: '#3F32F1',    // Blue
              secondary: '#BEDAE5',  // Light Grey
              accent: '#B9FF00',     // Yellow
              
              // Explicit Palette
              'brand-light-grey': '#BEDAE5',
              'brand-dark-grey': '#192D38',
              'brand-green': '#05E560',
              'brand-blue': '#3F32F1',
              'brand-yellow': '#B9FF00',
              'brand-purple': '#BE02F8',
            },
            animation: {
              'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for webkit browsers */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #192D38; /* Dark Grey */
      }
      ::-webkit-scrollbar-thumb {
        background: #BEDAE5; /* Light Grey */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3F32F1; /* Blue */
      }
      
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-secondary overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
